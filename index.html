<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Стартовая страница HelpDesk Студия">
    <title>HelpDesk Студия</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --background: oklch(0.9816 0.0017 247.8390);
        --foreground: oklch(0.1649 0.0352 281.8285);
        --card: oklch(1 0 0);
        --primary: oklch(0.6726 0.2904 341.4084);
        --primary-foreground: oklch(1 0 0);
        --accent: oklch(0.8903 0.1739 171.2690);
        --accent-foreground: oklch(0.1649 0.0352 281.8285);
        --muted-foreground: oklch(0.1649 0.0352 281.8285 / 0.72);
        --destructive: oklch(0.6535 0.2348 34.0370);
        --success: oklch(0.52 0.15 171.2690);
      }

      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        font-family: Outfit, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--foreground);
        background:
          linear-gradient(135deg, rgba(17, 17, 17, 0.04) 0 1px, transparent 1px 22px),
          var(--background);
      }

      button,
      input {
        font: inherit;
      }

      .page {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        padding: 32px 16px;
      }

      .glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .horizon {
        position: absolute;
        inset: 0;
        isolation: isolate;
        opacity: 0;
        transform: translateY(-100%) scaleY(1.5);
        animation: horizonTop 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
      }

      .horizon.bottom {
        transform: translateY(100%) scaleY(1.5);
        animation-name: horizonBottom;
        animation-delay: 0.24s;
        opacity: 0.72;
      }

      .arc {
        position: absolute;
        inset: 0;
        border-radius: 100%;
        transform: scale(var(--scale));
        background: var(--color);
        filter: blur(var(--blur, 0));
        box-shadow: var(--shadow, none);
      }

      .arc.white {
        --scale: 1.32;
        --color: #fff;
        --shadow: 0 -4px 23px 0 #ffffffb5;
      }

      .arc.purple {
        --scale: 1.2;
        --color: #a558fb;
        --blur: 31px;
      }

      .arc.blue {
        --scale: 1.24;
        --color: #4922e5;
        --blur: 21px;
      }

      .arc.black {
        --scale: 1.2;
        --color: #000;
        --blur: 51px;
      }

      .card-shell {
        position: relative;
        z-index: 1;
        width: min(100%, 440px);
        animation: cardRise 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.24s both;
      }

      .auth-card {
        width: 100%;
        padding: 28px;
        border: 3px solid var(--foreground);
        border-radius: 8px;
        background: var(--card);
        box-shadow: 10px 10px 0 var(--accent), -10px -10px 0 var(--primary);
      }

      .auth-card.is-popping {
        animation: panelPop 0.52s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .logo {
        width: min(100%, 220px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        margin: 0 auto 24px;
        overflow: hidden;
        border: 3px solid var(--foreground);
        border-radius: 8px;
        background: #fff;
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .title {
        margin-bottom: 24px;
        text-align: center;
      }

      .eyebrow {
        width: max-content;
        max-width: 100%;
        margin: 0 auto 9px;
        padding: 4px 12px;
        border: 2px solid var(--foreground);
        border-radius: 8px;
        background: var(--primary);
        color: var(--primary-foreground);
        font-family: "Fira Code", ui-monospace, monospace;
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 38px;
        line-height: 1.05;
        font-weight: 950;
      }

      h1 span {
        color: var(--primary);
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted-foreground);
        font-size: 15px;
        font-weight: 650;
        line-height: 1.45;
      }

      form {
        display: grid;
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field-label {
        color: var(--muted-foreground);
        font-size: 14px;
        font-weight: 850;
      }

      input {
        width: 100%;
        height: 48px;
        border: 2px solid var(--foreground);
        border-radius: 8px;
        padding: 0 14px;
        background: var(--card);
        color: var(--foreground);
        outline: none;
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 5px 5px 0 color-mix(in oklch, var(--accent) 40%, transparent);
      }

      .password-wrap {
        position: relative;
        display: block;
      }

      .password-wrap input {
        padding-right: 52px;
      }

      .icon-button {
        position: absolute;
        top: 50%;
        right: 6px;
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--muted-foreground);
        cursor: pointer;
      }

      .icon-button:hover {
        background: color-mix(in oklch, var(--accent) 24%, transparent);
        color: var(--primary);
      }

      .primary-button {
        height: 50px;
        border: 2px solid var(--foreground);
        border-radius: 8px;
        background: var(--primary);
        color: var(--primary-foreground);
        font-weight: 950;
        cursor: pointer;
        box-shadow: 5px 5px 0 var(--accent);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .primary-button:hover {
        transform: translateY(-1px);
        box-shadow: 7px 7px 0 var(--accent);
      }

      .secondary-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .secondary-actions button {
        min-height: 44px;
        border: 2px solid var(--foreground);
        border-radius: 8px;
        background: var(--card);
        color: var(--foreground);
        font-weight: 850;
        cursor: pointer;
        transition: background 180ms ease, color 180ms ease, transform 180ms ease;
      }

      .secondary-actions button:hover {
        transform: translateY(-1px);
        background: var(--accent);
        color: var(--accent-foreground);
      }

      .register-only {
        display: none;
      }

      .auth-card[data-mode="register"] .register-only {
        display: grid;
      }

      .message {
        min-height: 22px;
        margin: 0;
        color: var(--muted-foreground);
        font-size: 14px;
        line-height: 1.45;
        text-align: center;
      }

      .message.error {
        color: var(--destructive);
      }

      .message.success {
        color: var(--success);
      }

      @keyframes horizonTop {
        to {
          opacity: 0.72;
          transform: translateY(-50%) scaleY(1);
          filter: blur(0);
        }
      }

      @keyframes horizonBottom {
        to {
          opacity: 0.48;
          transform: translateY(50%) scaleY(1);
          filter: blur(0);
        }
      }

      @keyframes cardRise {
        from {
          opacity: 0;
          transform: translateY(84px) scale(0.92);
          filter: blur(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes panelPop {
        from {
          opacity: 0;
          transform: translateY(36px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 480px) {
        .page {
          align-items: start;
          padding-top: 22px;
        }

        .auth-card {
          padding: 22px 16px;
          box-shadow: 8px 8px 0 var(--accent), -8px -8px 0 var(--primary);
        }

        .logo {
          width: min(100%, 188px);
        }

        h1 {
          font-size: 30px;
        }

        .secondary-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="glow" aria-hidden="true">
        <div class="horizon">
          <div class="arc white"></div>
          <div class="arc purple"></div>
          <div class="arc blue"></div>
          <div class="arc black"></div>
        </div>
        <div class="horizon bottom">
          <div class="arc white"></div>
          <div class="arc purple"></div>
          <div class="arc blue"></div>
          <div class="arc black"></div>
        </div>
      </div>

      <section class="card-shell" aria-labelledby="page-title">
        <div class="auth-card" data-mode="login" id="authCard">
          <div class="logo" aria-label="Логотип">
            <img src="assets/logo.png" alt="Логотип HelpDesk Студия">
          </div>

          <div class="title">
            <p class="eyebrow">HelpDesk</p>
            <h1 id="page-title"><span>H</span>elpDesk Студия</h1>
            <p class="subtitle" id="subtitle">Вход для команды поддержки</p>
          </div>

          <form id="authForm" novalidate>
            <label class="field register-only">
              <span class="field-label">Email</span>
              <input name="email" type="email" autocomplete="email" placeholder="Введите email">
            </label>

            <label class="field">
              <span class="field-label">Логин</span>
              <input name="login" type="text" autocomplete="username" placeholder="Введите логин" required>
            </label>

            <label class="field">
              <span class="field-label">Пароль</span>
              <span class="password-wrap">
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Введите пароль" required>
                <button class="icon-button" type="button" id="togglePassword" aria-label="Показать пароль">◎</button>
              </span>
            </label>

            <button class="primary-button" type="submit" id="submitButton">Войти в студию</button>

            <div class="secondary-actions">
              <button type="button" id="secondaryLeft">Забыли пароль?</button>
              <button type="button" id="switchMode">Регистрация</button>
            </div>

            <p class="message" id="message" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <script>
      const authCard = document.querySelector("#authCard");
      const authForm = document.querySelector("#authForm");
      const title = document.querySelector("#page-title");
      const subtitle = document.querySelector("#subtitle");
      const passwordInput = document.querySelector("#password");
      const togglePassword = document.querySelector("#togglePassword");
      const submitButton = document.querySelector("#submitButton");
      const secondaryLeft = document.querySelector("#secondaryLeft");
      const switchMode = document.querySelector("#switchMode");
      const message = document.querySelector("#message");

      let mode = "login";

      function setMessage(text, type = "") {
        message.textContent = text;
        message.className = type ? `message ${type}` : "message";
      }

      function popCard() {
        authCard.classList.remove("is-popping");
        void authCard.offsetWidth;
        authCard.classList.add("is-popping");
      }

      function renderMode(nextMode) {
        mode = nextMode;
        authCard.dataset.mode = mode;
        setMessage("");
        popCard();

        if (mode === "register") {
          title.innerHTML = "<span>Р</span>егистрация";
          subtitle.textContent = "Создайте аккаунт команды поддержки";
          passwordInput.autocomplete = "new-password";
          submitButton.textContent = "Создать аккаунт";
          secondaryLeft.textContent = "Уже есть аккаунт";
          switchMode.textContent = "Назад ко входу";
          return;
        }

        title.innerHTML = "<span>H</span>elpDesk Студия";
        subtitle.textContent = "Вход для команды поддержки";
        passwordInput.autocomplete = "current-password";
        submitButton.textContent = "Войти в студию";
        secondaryLeft.textContent = "Забыли пароль?";
        switchMode.textContent = "Регистрация";
      }

      togglePassword.addEventListener("click", () => {
        const visible = passwordInput.type === "text";
        passwordInput.type = visible ? "password" : "text";
        togglePassword.textContent = visible ? "◎" : "◉";
        togglePassword.setAttribute("aria-label", visible ? "Показать пароль" : "Скрыть пароль");
      });

      secondaryLeft.addEventListener("click", () => {
        if (mode === "register") {
          renderMode("login");
          return;
        }

        setMessage("Восстановление пароля будет доступно после подключения сервера.");
      });

      switchMode.addEventListener("click", () => {
        renderMode(mode === "login" ? "register" : "login");
      });

      authForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const form = new FormData(authForm);
        const login = String(form.get("login") || "").trim();
        const password = String(form.get("password") || "").trim();
        const email = String(form.get("email") || "").trim();

        if (!login || !password || (mode === "register" && !email)) {
          setMessage(mode === "register" ? "Введите email, логин и пароль." : "Введите логин и пароль.", "error");
          return;
        }

        setMessage(mode === "register" ? "Регистрация готова к подключению сервера." : "Данные приняты. Подключите серверную авторизацию.", "success");
      });
    </script>
  </body>
</html>
