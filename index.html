<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Стартовая страница HelpDesk Студия">
    <title>HelpDesk Студия</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111;
        background: #fff;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(100%, 420px);
      }

      .logo {
        width: 160px;
        height: 160px;
        margin: 0 auto 24px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid #ddd;
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      h1 {
        margin: 0 0 24px;
        text-align: center;
        font-size: 32px;
        line-height: 1.1;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      input {
        height: 44px;
        padding: 0 12px;
        border: 1px solid #bbb;
        font: inherit;
      }

      button {
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid #111;
        background: #fff;
        color: #111;
        font: inherit;
        cursor: pointer;
      }

      .primary {
        background: #111;
        color: #fff;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .message {
        min-height: 20px;
        margin: 0;
        text-align: center;
        color: #555;
        font-size: 14px;
      }

      @media (max-width: 480px) {
        .actions {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="page-title">
        <div class="logo">
          <img src="assets/logo.png" alt="Логотип HelpDesk Студия">
        </div>

        <h1 id="page-title">HelpDesk Студия</h1>

        <form id="loginForm" novalidate>
          <label>
            Логин
            <input name="login" type="text" autocomplete="username" placeholder="Введите логин">
          </label>

          <label>
            Пароль
            <input name="password" type="password" autocomplete="current-password" placeholder="Введите пароль">
          </label>

          <button class="primary" type="submit">Войти</button>

          <div class="actions">
            <button type="button" id="forgotPassword">Забыли пароль?</button>
            <button type="button" id="registerAccount">Регистрация</button>
          </div>

          <p class="message" id="message" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script>
      const form = document.querySelector("#loginForm");
      const message = document.querySelector("#message");

      document.querySelector("#forgotPassword").addEventListener("click", () => {
        message.textContent = "Восстановление пароля будет подключено позже.";
      });

      document.querySelector("#registerAccount").addEventListener("click", () => {
        message.textContent = "Регистрация будет подключена позже.";
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const login = String(data.get("login") || "").trim();
        const password = String(data.get("password") || "").trim();

        message.textContent = login && password
          ? "Форма готова к подключению авторизации."
          : "Введите логин и пароль.";
      });
    </script>
  </body>
</html>
